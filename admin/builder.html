<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Page Builder - Phase 3</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    .builder-container {
      display: grid;
      grid-template-columns: 250px 1fr 300px;
      height: 100vh;
      gap: 0;
    }

    .sidebar-left {
      background: white;
      padding: 20px;
      border-right: 1px solid #ddd;
      overflow-y: auto;
    }

    .sidebar-left h3 {
      margin-bottom: 15px;
      color: #667eea;
      font-size: 14px;
    }

    .section-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .section-btn {
      padding: 10px;
      border: 2px solid #ddd;
      background: white;
      border-radius: 4px;
      cursor: move;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.3s ease;
      text-align: center;
    }

    .section-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .canvas {
      background: white;
      padding: 30px;
      overflow-y: auto;
      border-right: 1px solid #ddd;
    }

    .canvas h2 {
      text-align: center;
      color: #999;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .page-sections {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-item {
      background: #f9f9f9;
      border: 2px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      cursor: move;
      transition: all 0.3s ease;
      position: relative;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .section-item:hover {
      border-color: #667eea;
      background: #f5f5f5;
    }

    .section-item.drag-over {
      background: #e8eaf6;
      border-color: #667eea;
    }

    .section-item.dragging {
      opacity: 0.5;
    }

    .section-label {
      font-weight: 600;
      color: #667eea;
      font-size: 14px;
    }

    .section-controls {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 5px;
    }

    .icon-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .icon-btn:hover {
      background: #764ba2;
      transform: scale(1.1);
    }

    .icon-btn.delete {
      background: #f44336;
    }

    .icon-btn.delete:hover {
      background: #da190b;
    }

    .sidebar-right {
      background: white;
      padding: 20px;
      border-left: 1px solid #ddd;
      overflow-y: auto;
    }

    .sidebar-right h3 {
      margin-bottom: 15px;
      color: #667eea;
      font-size: 14px;
    }

    .properties {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .property-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .property-group label {
      font-size: 12px;
      font-weight: 600;
      color: #666;
    }

    .property-group input,
    .property-group select {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
    }

    .btn-secondary {
      background: #ddd;
      color: #333;
    }

    .btn-secondary:hover {
      background: #ccc;
    }

    @media (max-width: 1200px) {
      .builder-container {
        grid-template-columns: 1fr;
        height: auto;
      }

      .sidebar-left,
      .sidebar-right {
        display: none;
      }
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="builder-container">
    <!-- Left Sidebar -->
    <div class="sidebar-left">
      <h3>📦 Available Sections</h3>
      <div class="section-list">
        <div class="section-btn" draggable="true" ondragstart="dragStart(event, 'hero')">🎯 Hero</div>
        <div class="section-btn" draggable="true" ondragstart="dragStart(event, 'countdown')">⏳ Countdown</div>
        <div class="section-btn" draggable="true" ondragstart="dragStart(event, 'events')">📅 Events</div>
        <div class="section-btn" draggable="true" ondragstart="dragStart(event, 'gallery')">🖼️ Gallery</div>
        <div class="section-btn" draggable="true" ondragstart="dragStart(event, 'music')">🎵 Music</div>
        <div class="section-btn" draggable="true" ondragstart="dragStart(event, 'rsvp')">✉️ RSVP</div>
        <div class="section-btn" draggable="true" ondragstart="dragStart(event, 'map')">🗺️ Map</div>
        <div class="section-btn" draggable="true" ondragstart="dragStart(event, 'contact')">📞 Contact</div>
        <div class="section-btn" draggable="true" ondragstart="dragStart(event, 'footer')">👣 Footer</div>
      </div>
    </div>

    <!-- Canvas -->
    <div class="canvas">
      <h2>Drag sections to arrange your invitation</h2>
      <div class="page-sections" id="page-sections" ondragover="dragOver(event)" ondrop="dropSection(event)" ondragleave="dragLeave(event)">
        <div class="empty-state">
          <div class="empty-state-icon">📄</div>
          <p>Add sections to get started</p>
        </div>
      </div>
    </div>

    <!-- Right Sidebar -->
    <div class="sidebar-right">
      <h3>⚙️ Properties</h3>
      <div class="properties" id="properties">
        <p style="color: #999; font-size: 12px;">Select a section to edit</p>
      </div>
      <div class="action-buttons">
        <button class="btn btn-primary" onclick="saveLayout()">💾 Save</button>
        <button class="btn btn-secondary" onclick="resetLayout()">↺ Reset</button>
      </div>
    </div>
  </div>

  <script src="../js/layout-manager.js"></script>
  <script>
    let draggedElement = null;
    let draggedType = null;
    let selectedSection = null;

    async function initializeBuilder() {
      await layoutManager.initialize();
      renderLayout();
    }

    function dragStart(event, sectionType) {
      draggedType = sectionType;
      event.dataTransfer.effectAllowed = 'copy';
    }

    function dragOver(event) {
      event.preventDefault();
      event.dataTransfer.dropEffect = 'copy';
      document.getElementById('page-sections').classList.add('drag-over');
    }

    function dragLeave(event) {
      document.getElementById('page-sections').classList.remove('drag-over');
    }

    function dropSection(event) {
      event.preventDefault();
      document.getElementById('page-sections').classList.remove('drag-over');

      if (draggedType) {
        layoutManager.addSection(draggedType);
        renderLayout();
        draggedType = null;
      }
    }

    function renderLayout() {
      const sections = layoutManager.getSections();
      const container = document.getElementById('page-sections');

      if (sections.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📄</div><p>Add sections to get started</p></div>';
        return;
      }

      container.innerHTML = sections.map((section, index) => `
        <div class="section-item" draggable="true" ondragstart="dragSection(event, ${index})" ondragover="dragOver(event)" ondrop="dropReorder(event, ${index})">
          <div style="flex: 1; text-align: center;">
            <div class="section-label">${getSectionIcon(section)} ${section.charAt(0).toUpperCase() + section.slice(1)}</div>
          </div>
          <div class="section-controls">
            <button class="icon-btn" onclick="toggleSection(${index})">👁️</button>
            <button class="icon-btn" onclick="duplicateSection(${index})">📋</button>
            <button class="icon-btn delete" onclick="deleteSection(${index})">✕</button>
          </div>
        </div>
      `).join('');
    }

    function getSectionIcon(section) {
      const icons = {
        hero: '🎯',
        countdown: '⏳',
        events: '📅',
        gallery: '🖼️',
        music: '🎵',
        rsvp: '✉️',
        map: '🗺️',
        contact: '📞',
        footer: '👣'
      };
      return icons[section] || '📦';
    }

    function dragSection(event, index) {
      draggedElement = index;
      event.dataTransfer.effectAllowed = 'move';
    }

    function dropReorder(event, dropIndex) {
      event.preventDefault();
      if (draggedElement !== null && draggedElement !== dropIndex) {
        layoutManager.reorderSection(draggedElement, dropIndex);
        draggedElement = null;
        renderLayout();
      }
    }

    function deleteSection(index) {
      if (confirm('Delete this section?')) {
        layoutManager.deleteSection(index);
        renderLayout();
      }
    }

    function toggleSection(index) {
      layoutManager.toggleSection(index);
      renderLayout();
    }

    function duplicateSection(index) {
      layoutManager.duplicateSection(index);
      renderLayout();
    }

    function saveLayout() {
      layoutManager.saveLayout();
      alert('Layout saved successfully!');
    }

    function resetLayout() {
      if (confirm('Reset layout to default?')) {
        layoutManager.resetLayout();
        renderLayout();
      }
    }

    document.addEventListener('DOMContentLoaded', initializeBuilder);
  </script>
</body>
</html>
